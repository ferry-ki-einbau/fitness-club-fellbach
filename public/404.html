<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />

  <title>Seite nicht gefunden — Fitness Club Fellbach</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700;800&family=Barlow+Condensed:wght@400;600&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0F1419;color:#F5F0E8;font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;-webkit-font-smoothing:antialiased}
    .eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.5em;text-transform:uppercase;color:#C44552;font-weight:600;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:12px}
    .eyebrow::before,.eyebrow::after{content:'';display:block;width:28px;height:1px;background:#C44552}
    h1{font-family:'Oswald',sans-serif;font-size:clamp(5rem,18vw,12rem);font-weight:800;line-height:1;letter-spacing:-.04em;color:#F5F0E8;margin-bottom:8px}
    h1 span{color:#C44552}
    h2{font-family:'Oswald',sans-serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:700;text-transform:uppercase;letter-spacing:-.01em;color:#F5F0E8;margin-bottom:16px}
    p{color:#9A8878;font-size:16px;line-height:1.7;max-width:44ch;margin:0 auto 40px}
    .btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
    .btn-primary{background:#C44552;color:#fff;padding:14px 32px;text-decoration:none;font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;letter-spacing:.1em;text-transform:uppercase;transition:background .2s}
    .btn-primary:hover{background:#E15464}
    .btn-secondary{background:transparent;color:#9A8878;padding:14px 32px;text-decoration:none;font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;letter-spacing:.1em;text-transform:uppercase;border:1px solid rgba(245,240,232,0.15);transition:all .2s}
    .btn-secondary:hover{color:#F5F0E8;border-color:rgba(245,240,232,0.4)}
    .quote{margin-top:64px;font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:.15em;color:#5A6770;text-transform:uppercase}
  </style>
</head>
<body>
  <div class="eyebrow">404 · Seite nicht gefunden</div>
  <h1>4<span>0</span>4</h1>
  <h2>Diese Seite trainiert woanders.</h2>
  <p>Die gesuchte Seite existiert nicht — aber das Studio ist 24h für dich offen. Komm einfach vorbei.</p>
  <div class="btns">
    <a href="/" class="btn-primary">Zurück zur Startseite</a>
    <a href="tel:+4971158654" class="btn-secondary">Anrufen</a>
  </div>
  <div class="quote">Bruckstraße 61 · 70736 Fellbach · 05:00 – 24:00 täglich</div>

</html>
